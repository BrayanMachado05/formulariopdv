<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <title>Formulario dinámico</title>

    <style>
        /* ===== GENERAL ===== */
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f0ebf8;
            margin: 0;
            padding: 0;
        }

        /* ===== CONTENEDOR ===== */
        form {
            background: #ffffff;
            max-width: 650px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
        }

        /* ===== TITULOS ===== */
        h2,
        h3 {
            margin-bottom: 15px;
            color: #202124;
        }

        /* ===== INPUTS ===== */
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 18px;
            border: none;
            border-bottom: 2px solid #dadce0;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-bottom: 2px solid #673ab7;
        }

        /* ===== CHECKBOX PRINCIPALES ===== */
        .tipo-opcion {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        /* ===== CONTENEDOR DE OPCIONES ===== */
        #opcionesLocativo,
        #opcionesMobiliario {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* ===== OPCIONES INTERNAS (CHECKS) ===== */
        .opcion-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 5px;
            border-radius: 5px;
            transition: background 0.2s;
            cursor: pointer;
        }

        /* Hover tipo Google Forms */
        .opcion-item:hover {
            background-color: #eef0f3;
        }

        /* CHECK MÁS GRANDE Y CÓMODO */
        .opcion-item input[type="checkbox"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        /* TEXTO */
        .opcion-item span {
            font-size: 14px;
            color: #202124;
        }

        /* ===== BOTÓN ===== */
        button {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a2ea6;
        }
    </style>
</head>

<body>

    <h2 style="text-align: center; margin-top: 2rem; font-size: 36px; ">Formulario de Solicitud</h2>

    <form id="miFormulario">

        <h3>Datos personales</h3>

        <input type="text" id="cedula" placeholder="Cédula" required><br><br>
        <input type="text" id="nombre" placeholder="Nombre" required><br><br>
        <input type="text" id="codigo_pv" placeholder="Código Punto de Venta"><br><br>
        <input type="text" id="nombre_pv" placeholder="Nombre Punto de Venta"><br><br>
        <input type="text" id="celular" placeholder="Celular"><br><br>

        <label class="tipo-opcion">
            <input type="checkbox" id="locativo">
            <span>Locativo</span>
        </label>

        <label class="tipo-opcion">
            <input type="checkbox" id="mobiliario">
            <span>Mobiliario</span>
        </label>

        <!-- OPCIONES LOCATIVO -->
        <div id="opcionesLocativo" style="display:none;">
            <strong>Locativo:</strong>

            <label class="opcion-item">
                <input type="checkbox" name="locativo_op" value="Pintar paredes">
                <span>Pintar paredes</span>
            </label>

            <label class="opcion-item">
                <input type="checkbox" name="locativo_op" value="Instalar llave de agua">
                <span>Instalar llave de agua</span>
            </label>

            <label class="opcion-item">
                <input type="checkbox" name="locativo_op" value="Estucar">
                <span>Estucar</span>
            </label>
        </div>

        <!-- OPCIONES MOBILIARIO -->
        <div id="opcionesMobiliario" style="display:none;">
            <strong>Mobiliario:</strong>

            <label class="opcion-item">
                <input type="checkbox" name="mobiliario_op" value="Ventilador">
                <span>Ventilador</span>
            </label>

            <label class="opcion-item">
                <input type="checkbox" name="mobiliario_op" value="Silla">
                <span>Silla</span>
            </label>

            <label class="opcion-item">
                <input type="checkbox" name="mobiliario_op" value="Rodachina módulo">
                <span>Rodachina módulo</span>
            </label>
        </div>

        <br><br><br>

        <button type="submit">Enviar</button>

    </form>

    <script>
        const locativo = document.getElementById("locativo");
        const mobiliario = document.getElementById("mobiliario");

        const opcionesLocativo = document.getElementById("opcionesLocativo");
        const opcionesMobiliario = document.getElementById("opcionesMobiliario");

        locativo.addEventListener("change", () => {
            if (locativo.checked) {
                // Mostrar locativo
                opcionesLocativo.style.display = "block";

                // Ocultar y desactivar mobiliario
                opcionesMobiliario.style.display = "none";
                mobiliario.checked = false;
                mobiliario.disabled = true;

                // Limpiar checks internos de mobiliario
                document.querySelectorAll("input[name='mobiliario_op']")
                    .forEach(el => el.checked = false);

            } else {
                opcionesLocativo.style.display = "none";
                mobiliario.disabled = false;
            }
        });

        mobiliario.addEventListener("change", () => {
            if (mobiliario.checked) {
                // Mostrar mobiliario
                opcionesMobiliario.style.display = "block";

                // Ocultar y desactivar locativo
                opcionesLocativo.style.display = "none";
                locativo.checked = false;
                locativo.disabled = true;

                // Limpiar checks internos de locativo
                document.querySelectorAll("input[name='locativo_op']")
                    .forEach(el => el.checked = false);

            } else {
                opcionesMobiliario.style.display = "none";
                locativo.disabled = false;
            }
        });

        document.getElementById("miFormulario").addEventListener("submit", function (e) {
            e.preventDefault();

            const datos = {
                cedula: document.getElementById("cedula").value,
                nombre: document.getElementById("nombre").value,
                codigo_pv: document.getElementById("codigo_pv").value,
                nombre_pv: document.getElementById("nombre_pv").value,
                celular: document.getElementById("celular").value,

                locativo: locativo.checked,
                mobiliario: mobiliario.checked,

                locativo_opciones: [...document.querySelectorAll("input[name='locativo_op']:checked")]
                    .map(el => el.value).join(", "),

                mobiliario_opciones: [...document.querySelectorAll("input[name='mobiliario_op']:checked")]
                    .map(el => el.value).join(", ")
            };

            fetch("https://script.google.com/macros/s/AKfycbx9tQXgNg1ercPJADgx41cP3TDXji-gAkNreW6JGuCpUN3ofnN64ddX1n-anDqACelVRg/exec", {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(datos)
            });

            alert("Enviado correctamente");
        });
    </script>

</body>

</html>
